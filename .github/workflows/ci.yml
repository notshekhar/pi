name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # core publishes its .d.ts via build; cli typecheck depends on it.
      - run: bun run build
      - run: bun run typecheck
      - run: bun run compile
      - name: Smoke test built binary
        run: ./out/bun/pi --version
