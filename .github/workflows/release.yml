name: release
run-name: release ${{ inputs.tag || github.ref_name }} (by @${{ github.actor }})

on:
    push:
        tags:
            - "v*.*.*"
    workflow_dispatch:
        inputs:
            tag:
                description: "Version tag (e.g. v0.1.5)."
                required: true

permissions:
    contents: write

jobs:
    # ─── Job 1: resolve tag ───────────────────────────────────────────────────
    prepare:
        name: prepare
        runs-on: ubuntu-latest
        outputs:
            tag: ${{ steps.tag.outputs.tag }}
            ver: ${{ steps.tag.outputs.ver }}
        steps:
            - name: Resolve tag
              id: tag
              run: |
                  if [ -n "${{ github.event.inputs.tag }}" ]; then
                    tag="${{ github.event.inputs.tag }}"
                  else
                    tag="${GITHUB_REF##*/}"
                  fi
                  case "$tag" in v*) ;; *) tag="v$tag" ;; esac
                  v="${tag#v}"
                  echo "tag=$tag" >> "$GITHUB_OUTPUT"
                  echo "ver=$v"   >> "$GITHUB_OUTPUT"

    # ─── Job 2: per-platform binary build (matrix) ───────────────────────────
    # loop has no native NAPI modules anymore, so `bun build --compile
    # --target=…` cross-compiles every target from any host (Bun downloads the
    # prebuilt runtime for the target). Most targets still build on a runner
    # matching their OS+arch so the --version smoke test runs natively.
    # darwin-x64 is the exception: GitHub offers no free Intel-mac runner, so it
    # is cross-compiled on the Apple-Silicon macos-14 runner. It can't be run
    # there for the smoke test (Rosetta 2 SIGILLs on AVX/baseline alike), so its
    # binary is validated statically (Mach-O x86_64) instead of executed.
    build-binary:
        name: binary (${{ matrix.target }})
        needs: prepare
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: darwin-arm64
                      runner: macos-14
                    - target: darwin-x64
                      runner: macos-14 # arm64 host → cross-compiled, validated statically
                    - target: linux-x64
                      runner: ubuntu-latest
                    - target: linux-arm64
                      runner: ubuntu-24.04-arm
                    - target: windows-x64
                      runner: windows-latest
        runs-on: ${{ matrix.runner }}
        # Force bash on Windows runners too (default is pwsh). Git Bash ships
        # with windows-latest and provides sha256sum, tar, bun shell helpers.
        defaults:
            run:
                shell: bash
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Sync package versions
              run: |
                  v="${{ needs.prepare.outputs.ver }}"
                  bun -e "
                    const fs = require('fs');
                    for (const p of ['packages/core/package.json','packages/tui/package.json','packages/cli/package.json']) {
                      const j = JSON.parse(fs.readFileSync(p,'utf8'));
                      j.version = '$v';
                      fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
                    }
                  "

            - run: bun install --frozen-lockfile
            - run: bun run gen:catalog
            - run: bun packages/core/build.ts
            - run: bun packages/tui/build.ts
            # Retry the compile: fetching the cross-target Bun runtime is
            # occasionally flaky ("Failed to extract executable … download may
            # be incomplete"), especially for the -baseline variants. 3 attempts
            # with a backoff turns a transient download blip into a pass.
            - name: Build binary
              run: |
                  n=0
                  until bun packages/cli/build-bin.ts bun-${{ matrix.target }}; do
                    n=$((n + 1))
                    if [ "$n" -ge 3 ]; then echo "build failed after $n attempts"; exit 1; fi
                    echo "build attempt $n failed — retrying in 5s…"; sleep 5
                  done

            - name: Smoke test binary
              run: |
                  # bun --compile appends .exe on windows targets
                  bin="./packages/cli/dist/bin/${{ matrix.target }}/loop"
                  [ -f "${bin}.exe" ] && bin="${bin}.exe"
                  if [ "${{ matrix.target }}" = "darwin-x64" ]; then
                    # Cross-compiled on the arm64 runner — can't run it here:
                    # Rosetta 2 lacks AVX and SIGILLs even on the baseline build,
                    # so executing it is a false negative. Validate statically
                    # that it's a real, non-trivial x86_64 Mach-O instead.
                    file "$bin"
                    file "$bin" | grep -q "x86_64"
                    sz=$(stat -f%z "$bin" 2>/dev/null || stat -c%s "$bin")
                    test "$sz" -gt 10000000
                  else
                    "$bin" --version
                  fi

            - name: Compute sha256
              working-directory: packages/cli/dist/bin
              run: |
                  if command -v sha256sum >/dev/null; then
                    sha256sum "loop-${{ matrix.target }}.tar.gz" > "loop-${{ matrix.target }}.tar.gz.sha256"
                  else
                    shasum -a 256 "loop-${{ matrix.target }}.tar.gz" > "loop-${{ matrix.target }}.tar.gz.sha256"
                  fi
                  ls -lh

            - name: Upload binary artifact
              uses: actions/upload-artifact@v4
              with:
                  name: bin-${{ matrix.target }}
                  path: |
                      packages/cli/dist/bin/loop-${{ matrix.target }}.tar.gz
                      packages/cli/dist/bin/loop-${{ matrix.target }}.tar.gz.sha256
                  retention-days: 14

    # ─── Job 3: GitHub Release ────────────────────────────────────────────────
    release:
        name: github-release
        needs: [prepare, build-binary]
        runs-on: ubuntu-latest
        steps:
            - name: Download all binary artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: bin-*
                  path: release
                  merge-multiple: true

            - name: Aggregate SHA256SUMS
              working-directory: release
              run: |
                  ls -lh
                  : > SHA256SUMS
                  for f in loop-*.tar.gz; do
                    sha256sum "$f" >> SHA256SUMS
                  done
                  cat SHA256SUMS

            - name: Create / update GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ needs.prepare.outputs.tag }}
                  name: ${{ needs.prepare.outputs.tag }}
                  generate_release_notes: true
                  files: |
                      release/loop-*.tar.gz
                      release/loop-*.tar.gz.sha256
                      release/SHA256SUMS

    # ─── Job 4: bump the Homebrew tap ─────────────────────────────────────────
    # Regenerates notshekhar/homebrew-tap's Formula/loop.rb from the release's
    # SHA256SUMS so `brew install notshekhar/tap/loop` tracks every tag with no
    # manual step. Needs a PAT (HOMEBREW_TAP_TOKEN) with write access to the tap
    # repo — the default GITHUB_TOKEN can't push to a different repository.
    update-homebrew-tap:
        name: update-homebrew-tap
        needs: [prepare, release]
        runs-on: ubuntu-latest
        steps:
            - name: Check out loop (for the render script)
              uses: actions/checkout@v4
              with:
                  path: loop

            - name: Check out tap repo
              uses: actions/checkout@v4
              with:
                  repository: notshekhar/homebrew-tap
                  token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
                  path: tap

            - name: Fetch checksums from release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh release download "${{ needs.prepare.outputs.tag }}" \
                    --repo "${{ github.repository }}" \
                    --pattern SHA256SUMS --output SHA256SUMS --clobber

            - name: Render Formula/loop.rb
              run: |
                  mkdir -p tap/Formula
                  python3 loop/.github/scripts/render-formula.py \
                    "${{ needs.prepare.outputs.ver }}" \
                    SHA256SUMS \
                    tap/Formula/loop.rb

            - name: Commit & push
              working-directory: tap
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add Formula/loop.rb
                  if git diff --cached --quiet; then
                    echo "Formula already up to date — nothing to push."
                  else
                    git commit -m "loop ${{ needs.prepare.outputs.ver }}"
                    git push
                  fi
