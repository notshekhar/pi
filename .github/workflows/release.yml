name: release
run-name: release ${{ inputs.tag || github.ref_name }} (by @${{ github.actor }})

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v0.1.5)."
        required: true

permissions:
  contents: write
  id-token: write   # npm provenance

jobs:
  # ─── Job 1: build + package ────────────────────────────────────────────────
  build:
    name: build
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      ver: ${{ steps.tag.outputs.ver }}
      asset: ${{ steps.pkg.outputs.name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF##*/}"
          fi
          case "$tag" in v*) ;; *) tag="v$tag" ;; esac
          v="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "ver=$v"   >> "$GITHUB_OUTPUT"

      - name: Sync package versions
        run: |
          v="${{ steps.tag.outputs.ver }}"
          bun -e "
            const fs = require('fs');
            for (const p of ['packages/core/package.json','packages/cli/package.json']) {
              const j = JSON.parse(fs.readFileSync(p,'utf8'));
              j.version = '$v';
              fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
            }
          "

      - run: bun install --frozen-lockfile
      - run: bun run build

      - name: Smoke test built binary
        run: node packages/cli/dist/cli.js --version

      - name: Package single tarball
        id: pkg
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          name="pi-${tag}.tar.gz"
          mkdir -p release
          tar -czf "release/${name}" \
            package.json \
            bun.lock \
            packages/core/package.json packages/core/dist \
            packages/cli/package.json packages/cli/dist
          (cd release && sha256sum "${name}" > "${name}.sha256")
          ls -lh release/
          echo "name=${name}" >> "$GITHUB_OUTPUT"

      - name: Pin CLI's @notshekhar/pi-core dep to exact version
        run: |
          v="${{ steps.tag.outputs.ver }}"
          bun -e "
            const fs = require('fs');
            const cli = JSON.parse(fs.readFileSync('packages/cli/package.json','utf8'));
            if (cli.dependencies && cli.dependencies['@notshekhar/pi-core']) {
              cli.dependencies['@notshekhar/pi-core'] = '$v';
            }
            fs.writeFileSync('packages/cli/package.json', JSON.stringify(cli, null, 2) + '\n');
            console.log('cli pinned:', cli.name, cli.version, '→ core', cli.dependencies['@notshekhar/pi-core']);
          "

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ steps.tag.outputs.tag }}
          path: |
            release/
            packages/cli/dist/
            packages/core/dist/
            packages/core/package.json
            packages/cli/package.json
            package.json
            bun.lock
          retention-days: 14

  # ─── Job 2: GitHub Release ────────────────────────────────────────────────
  release:
    name: github-release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ needs.build.outputs.tag }}
          path: .

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: ${{ needs.build.outputs.tag }}
          generate_release_notes: true
          files: |
            release/${{ needs.build.outputs.asset }}
            release/${{ needs.build.outputs.asset }}.sha256

  # ─── Job 3: npm publish ───────────────────────────────────────────────────
  npm-publish:
    name: npm-publish
    needs: build
    runs-on: ubuntu-latest
    if: ${{ needs.build.result == 'success' }}
    steps:
      - name: Check NPM_TOKEN
        id: check
        run: |
          if [ -n "${{ secrets.NPM_TOKEN }}" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::NPM_TOKEN not set — npm publish skipped."
          fi

      - name: Download build artifact
        if: steps.check.outputs.publish == 'true'
        uses: actions/download-artifact@v4
        with:
          name: build-${{ needs.build.outputs.tag }}
          path: .

      - uses: actions/setup-node@v4
        if: steps.check.outputs.publish == 'true'
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Publish @notshekhar/pi-core
        if: steps.check.outputs.publish == 'true'
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Publish @notshekhar/pi
        if: steps.check.outputs.publish == 'true'
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
