name: release
run-name: release ${{ inputs.tag || github.ref_name }} (by @${{ github.actor }})

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v0.1.5)."
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF##*/}"
          fi
          # Normalize: always have leading `v` for asset names.
          case "$tag" in v*) ;; *) tag="v$tag" ;; esac
          v="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "ver=$v"   >> "$GITHUB_OUTPUT"

      - name: Sync package versions
        run: |
          v="${{ steps.tag.outputs.ver }}"
          node -e "
            const fs = require('fs');
            for (const p of ['packages/core/package.json','packages/cli/package.json']) {
              const j = JSON.parse(fs.readFileSync(p,'utf8'));
              j.version = '$v';
              fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
            }
          "

      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - run: npm run typecheck

      - name: Smoke test built binary
        run: node packages/cli/dist/cli.js --version

      - name: Package single tarball
        id: pkg
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          name="pi-${tag}.tar.gz"
          mkdir -p release
          # Single tarball: dist + package manifests + lockfile. Installer runs
          # `npm ci --omit=dev` to materialize runtime deps.
          tar -czf "release/${name}" \
            package.json \
            package-lock.json \
            packages/core/package.json packages/core/dist \
            packages/cli/package.json packages/cli/dist
          (cd release && sha256sum "${name}" > "${name}.sha256")
          ls -lh release/
          echo "name=${name}" >> "$GITHUB_OUTPUT"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          # Replace assets each run so a re-tag/dispatch keeps things consistent.
          files: |
            release/${{ steps.pkg.outputs.name }}
            release/${{ steps.pkg.outputs.name }}.sha256
